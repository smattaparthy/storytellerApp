[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Configure asyncio mode for pytest-asyncio
# Pytest-asyncio should default to 'auto' mode if installed,
# but explicitly setting it can be clearer.
asyncio_mode = auto

# Add 'tests' to pythonpath to help with imports if needed,
# though with proper project structure (src layout or editable install)
# this might not always be necessary.
# For now, assume backend is run where `app` is discoverable.
# If running pytest from `backend/` directory, it should find `app`.
# pythonpath = . app

# Optional: default command-line options
# addopts = --cov=app --cov-report=html -p no:warnings
# (Coverage would require pytest-cov)

# Optional: Mark slow tests or tests requiring network
# markers =
#     slow: marks tests as slow to run
#     network: marks tests requiring network access

# Set testpaths to look for tests only in the 'tests' directory
testpaths = tests
